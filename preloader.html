<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustFund Preloader</title>
<style>

  html { background: #010005; }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #010005;
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Segoe UI", system-ui, sans-serif;
  }

  /* Permanent dark floor — never animates */
  .dark-floor {
    position: fixed;
    inset: 0;
    background: #010005;
    z-index: 0;
  }

  .preloader {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    animation: wrapFadeOut 0.6s ease 6.2s forwards;
  }

  .logo-stage {
    position: relative;
    width: 200px;
    height: 267px;
  }

  .logo-stage svg {
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 0 18px rgba(100, 45, 240, 0.38));
  }

  .glow-ring {
    position: absolute;
    top: 4%;
    left: 50%;
    transform: translateX(-50%) scale(0.75);
    width: 190px;
    height: 190px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120,55,255,0.28) 0%, transparent 68%);
    opacity: 0;
    pointer-events: none;
    z-index: 2;
  }

  .progress-wrap {
    width: 180px;
    height: 2px;
    background: #180930;
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    animation: barAppear 0.01s linear 0.1s forwards;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4C1D95, #8B51FA, #C4B5FD);
    border-radius: 2px;
    animation: barFill 5.8s cubic-bezier(0.25, 0.1, 0.25, 1) 0.1s forwards;
  }

  /*
  ══════════════════════════════════════════════════
  8-STEP SEQUENCE — opacity + transform only
  Step 1+2  Hex rises in          0.15s → 1.1s
  Step 3    Hex settles           1.1s
  Step 4    T-bar drops in        1.2s → 1.65s
  Step 5    F+seam slides up      1.8s → 2.3s
  Step 6    Glow pulse            2.6s → 3.5s
  Step 7    Wordmark fades up     2.95s → 3.5s
  Step 8    Fade out + loop       6.2s
  ══════════════════════════════════════════════════
  */

  #g-hex {
    opacity: 0;
    transform: translateY(22px) scale(0.95);
    transform-origin: center center;
    animation: riseIn 0.95s cubic-bezier(0.4, 0, 0.2, 1) 0.15s forwards;
  }

  #g-tbar {
    opacity: 0;
    transform: translateY(-18px);
    animation: dropIn 0.45s cubic-bezier(0.34, 1.4, 0.64, 1) 1.2s forwards;
  }

  #g-fseam {
    opacity: 0;
    transform: translateY(18px);
    animation: riseIn 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) 1.8s forwards;
  }

  .glow-ring {
    animation: glowPulse 1.1s ease-out 2.6s forwards;
  }

  #g-wordmark {
    opacity: 0;
    transform: translateY(14px);
    animation: riseIn 0.55s cubic-bezier(0.4, 0, 0.2, 1) 2.95s forwards;
  }

  .preloader {
    animation: wrapFadeOut 0.6s ease 6.2s forwards;
  }

  @keyframes riseIn {
    0%   { opacity: 0; transform: translateY(22px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0)    scale(1); }
  }
  @keyframes dropIn {
    0%   { opacity: 0; transform: translateY(-18px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes glowPulse {
    0%   { opacity: 0; transform: translateX(-50%) scale(0.75); }
    35%  { opacity: 1; transform: translateX(-50%) scale(1.08); }
    100% { opacity: 0; transform: translateX(-50%) scale(1.4); }
  }
  @keyframes barAppear { to { opacity: 1; } }
  @keyframes barFill {
    0%   { width: 0%; }
    100% { width: 100%; }
  }
  @keyframes wrapFadeOut {
    0%   { opacity: 1; }
    100% { opacity: 0; pointer-events: none; }
  }

</style>
</head>
